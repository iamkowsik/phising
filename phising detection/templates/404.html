<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - PhishGuard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-shield-alt"></i>
                PhishGuard
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Home</a></li>
            </ul>
        </div>
    </nav>

    <!-- 404 Section -->
    <section style="padding: 80px 20px; text-align: center; min-height: calc(100vh - 200px);">
        <div class="container">
            <h1 style="font-size: 5rem; color: var(--primary-color); margin-bottom: 1rem;">
                <i class="fas fa-exclamation-triangle"></i>
            </h1>
            <h2 style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--text-dark);">404 - Page Not Found</h2>
            <p style="font-size: 1.1rem; color: var(--text-light); margin-bottom: 2rem;">
                Sorry, the page you're looking for doesn't exist. Let's get you back on track.
            </p>
            <a href="/" class="cta-button">Go to Home</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 PhishGuard. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
